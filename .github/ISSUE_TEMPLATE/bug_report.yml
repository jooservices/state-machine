name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal reproducible case and do not use this form for security vulnerabilities.
  - type: input
    id: affected-version
    attributes:
      label: Affected version
      description: Which package version is affected?
      placeholder: e.g. v1.2.3 or dev-develop
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      description: Which PHP version are you using?
      placeholder: e.g. 8.5.1
    validations:
      required: true
  - type: input
    id: install-method
    attributes:
      label: Install method / dependency version
      description: How is the package installed and what dependency constraints are in use?
      placeholder: e.g. Composer require jooservices/state-machine:^1.0
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Create ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: minimal-code-sample
    attributes:
      label: Minimal code sample
      description: Provide the smallest possible example that reproduces the issue.
      render: php
    validations:
      required: true
  - type: textarea
    id: error-output
    attributes:
      label: Error output / stack trace
      description: Include any relevant exception, warning, or stack trace.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, framework version if relevant, and any other environment details.
      placeholder: |
        OS:
        Framework:
        Extensions:
        Additional context:
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I tested the latest available version when possible.
          required: true
        - label: I included a minimal reproducible example.
          required: true
        - label: This is not a public security vulnerability report.
          required: true