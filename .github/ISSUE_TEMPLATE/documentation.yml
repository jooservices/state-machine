name: Documentation
description: Report missing, outdated, or unclear documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: documentation-page
    attributes:
      label: Documentation page or file
      description: Which page, section, or file is affected?
      placeholder: e.g. README.md or docs/04-development/07-contributing.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing, outdated, or unclear?
    validations:
      required: true
  - type: textarea
    id: expected-clarification
    attributes:
      label: Expected clarification
      description: What should the documentation make clear?
    validations:
      required: true
  - type: input
    id: affected-audience
    attributes:
      label: Affected audience
      description: Who is blocked or confused by the current documentation?
      placeholder: e.g. first-time users, maintainers, AI contributors
    validations:
      required: true
  - type: textarea
    id: suggested-update
    attributes:
      label: Suggested update
      description: If you have a concrete suggestion, add it here.
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I checked the README and docs before opening this issue.
          required: true
        - label: This issue is documentation-only and not a bug or feature request.
          required: true