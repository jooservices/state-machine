# Fortify AST is optional for this package.
# When Fortify credentials are not configured, the workflow reports a successful skip.
# This avoids the GitHub Actions failure mode where secret-based job `if` conditions
# skip every job and the workflow concludes as failure.

name: Fortify AST Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '32 4 * * 3'
  workflow_dispatch:

jobs:
  fortify-gate:
    name: Fortify Credentials Gate
    runs-on: ubuntu-latest
    outputs:
      should_scan: ${{ steps.creds.outputs.should_scan }}
    steps:
      - name: Detect Fortify credentials
        id: creds
        env:
          FOD_TENANT: ${{ secrets.FOD_TENANT }}
          FOD_USER: ${{ secrets.FOD_USER }}
          FOD_PAT: ${{ secrets.FOD_PAT }}
          SSC_URL: ${{ vars.SSC_URL }}
          SSC_TOKEN: ${{ secrets.SSC_TOKEN }}
          SC_CLIENT_AUTH_TOKEN: ${{ secrets.SC_CLIENT_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if { [ -n "${FOD_TENANT}" ] && [ -n "${FOD_USER}" ] && [ -n "${FOD_PAT}" ]; } || \
             { [ -n "${SSC_URL}" ] && [ -n "${SSC_TOKEN}" ] && [ -n "${SC_CLIENT_AUTH_TOKEN}" ]; }; then
            echo "should_scan=true" >> "${GITHUB_OUTPUT}"
            echo "Fortify credentials detected; scan job will run."
          else
            echo "should_scan=false" >> "${GITHUB_OUTPUT}"
            echo "Fortify credentials are not configured; scan will be skipped successfully."
          fi

  fortify-skipped:
    name: Fortify Scan Skipped
    needs: fortify-gate
    if: needs.fortify-gate.outputs.should_scan != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped scan
        run: echo "Fortify credentials are not configured; skipping scan."

  Fortify-AST-Scan:
    name: Fortify AST Scan
    needs: fortify-gate
    if: needs.fortify-gate.outputs.should_scan == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check Out Source Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Fortify Scan
        uses: fortify/github-action@0540f6aefd95d12a5fbed40f406d825fad64330e
        with:
          sast-scan: true
          debricked-sca-scan: true
        env:
          FOD_URL: https://ams.fortify.com
          FOD_TENANT: ${{ secrets.FOD_TENANT }}
          FOD_USER: ${{ secrets.FOD_USER }}
          FOD_PASSWORD: ${{ secrets.FOD_PAT }}
          SSC_URL: ${{ vars.SSC_URL }}
          SSC_TOKEN: ${{ secrets.SSC_TOKEN }}
          SC_SAST_TOKEN: ${{ secrets.SC_CLIENT_AUTH_TOKEN }}
          DEBRICKED_TOKEN: ${{ secrets.DEBRICKED_TOKEN }}
          SC_SAST_SENSOR_VERSION: 24.4.0
